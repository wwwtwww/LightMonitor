name: Package LightMonitor

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  package:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack
        run: npm run pack

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LightMonitor-zip
          path: dist/*.zip
